<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NITT Certificate Verification</title>

<style>
body{
margin:0;
font-family:Ari
al,sans-serif;
background:#f2f5f9;
}

.container{
max-width:700px;
margin:40px auto;
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.logo{
width:120px;
display:block;
margin:auto;
}

h1{
text-align:center;
color:#003366;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td{
padding:12px;
border:1px solid #ddd;
}

.label{
font-weight:bold;
background:#f5f5f5;
width:40%;
}

.status{
color:green;
font-weight:bold;
}

.qr{
text-align:center;
margin-top:30px;
}
</style>

</head>
<body>

<div class="container">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Bitmap_VS_SVG.svg" alt="Logo">

<h1>Certificate Verification</h1>

<table>
<tr>
<td class="label">Candidate Name</td>
<td>ARIF ALAM</td>
</tr>

<tr>
<td class="label">Father's Name</td>
<td>MD. NIZAMUDDIN</td>
</tr>

<tr>
<td class="label">Course</td>
<td>Diploma in Fire & Safety Management</td>
</tr>

<tr>
<td class="label">Percentage</td>
<td>85%</td>
</tr>

<tr>
<td class="label">Status</td>
<td class="status">VERIFIED ✓</td>
</tr>
</table>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=NITT-Verification" alt="QR Code">
</div>

</div>

</body>
</html>
